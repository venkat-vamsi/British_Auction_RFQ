# ================================================================
# British Auction RFQ System — Application Configuration
# ================================================================

spring.application.name=british-rfq

spring.datasource.url=jdbc:mysql://localhost:3306/british_rfq?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=8081

jwt.secret=britishRfqSuperSecretKey2024ForJWTSigningMustBe256BitsLong!
jwt.expiration-ms=86400000


auction.scheduler.interval-ms=30000

logging.level.com.rfq.british=INFO
logging.level.org.springframework.security=WARN
